<!DOCTYPE html>
<html>
<head>
<title>Bus Tracker Login</title>
  <style>
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #8e24aa, #ce93d8);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 40px 50px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
    width: 350px;
}

h2 {
    margin-bottom: 30px;
    color: #4a148c;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    background: #6a1b9a;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #4a148c;
}

#msg {
    color: red;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>
<body>
<div class="container">
    <h2>Bus Incharge Login</h2>

    <input type="email" id="email" placeholder="Enter Email"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>
<script>

// 27 bus incharge accounts
const users = [
  { email:"bus1@klh.com", password:"bus1pass", bus:"bus1" },
  { email:"bus2@klh.com", password:"bus2pass", bus:"bus2" },
  { email:"bus3@klh.com", password:"bus3pass", bus:"bus3" },
  { email:"bus4@klh.com", password:"bus4pass", bus:"bus4" },
  { email:"bus5@klh.com", password:"bus5pass", bus:"bus5" },
  { email:"bus6@klh.com", password:"bus6pass", bus:"bus6" },
  { email:"bus7@klh.com", password:"bus7pass", bus:"bus7" },
  { email:"bus8@klh.com", password:"bus8pass", bus:"bus8" },
  { email:"bus9@klh.com", password:"bus9pass", bus:"bus9" },
  { email:"bus10@klh.com", password:"bus10pass", bus:"bus10" },
  { email:"bus11@klh.com", password:"bus11pass", bus:"bus11" },
  { email:"bus12@klh.com", password:"bus12pass", bus:"bus12" },
  { email:"bus13@klh.com", password:"bus13pass", bus:"bus13" },
  { email:"bus14@klh.com", password:"bus14pass", bus:"bus14" },
  { email:"bus15@klh.com", password:"bus15pass", bus:"bus15" },
  { email:"bus16@klh.com", password:"bus16pass", bus:"bus16" },
  { email:"bus17@klh.com", password:"bus17pass", bus:"bus17" },
  { email:"bus18@klh.com", password:"bus18pass", bus:"bus18" },
  { email:"bus19@klh.com", password:"bus19pass", bus:"bus19" },
  { email:"bus20@klh.com", password:"bus20pass", bus:"bus20" },
  { email:"bus21@klh.com", password:"bus21pass", bus:"bus21" },
  { email:"bus22@klh.com", password:"bus22pass", bus:"bus22" },
  { email:"bus23@klh.com", password:"bus23pass", bus:"bus23" },
  { email:"bus24@klh.com", password:"bus24pass", bus:"bus24" },
  { email:"bus25@klh.com", password:"bus25pass", bus:"bus25" },
  { email:"bus26@klh.com", password:"bus26pass", bus:"bus26" },
  { email:"bus27@klh.com", password:"bus27pass", bus:"bus27" }
];

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const user = users.find(u => u.email === email && u.password === pass);

  if(user){
    // Save login info
    localStorage.setItem("loggedUser", JSON.stringify(user));
    window.location.href = "admin.html";
  } else {
    document.getElementById("msg").innerText = "Wrong email or password!";
  }
}

</script>

</body>
</html>
