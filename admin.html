<!DOCTYPE html>
<html>
<head>
<title>Update Bus Location</title>
  <style>
body {
    font-family: 'Arial', sans-serif;
    background: #f4f6f8;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 40px 50px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
    width: 400px;
}

h2 {
    margin-bottom: 25px;
    color: #6a1b9a;
}

select, input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 48%;
    padding: 12px;
    margin: 10px 1%;
    background: #6a1b9a;
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #4a148c;
}

#status {
    margin-top: 15px;
    color: green;
    font-weight: bold;
}
</style>
</head>

<body>

<body>
<div class="container">
    <h2>Update Bus Location</h2>

    <select id="busSelect"></select><br>
    <input type="text" id="locationLink" placeholder="Paste Google Maps Live Location"><br>

    <button onclick="updateBus()">Update Location</button>
    <button onclick="logout()">Logout</button>

    <p id="status"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "cb-tracker-446fb.firebaseapp.com",
  databaseURL: "https://cb-tracker-446fb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cb-tracker-446fb",
  storageBucket: "cb-tracker-446fb.firebasestorage.app",
  messagingSenderId: "565822995497",
  appId: "1:565822995497:web:09ce8f9224eadbb2f0f038"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

// Check login
const user = JSON.parse(localStorage.getItem("loggedUser"));
if(!user){
  alert("Please login first!");
  window.location.href = "login.html";
}

// Create bus dropdown
for(let i=1; i<=27; i++){
  const option = document.createElement("option");
  option.value = "bus"+i;
  option.textContent = "Bus "+i;
  document.getElementById("busSelect").appendChild(option);
}

// Restrict each bus incharge to only their bus
document.getElementById("busSelect").value = user.bus;
document.getElementById("busSelect").disabled = true;

// Update function
window.updateBus = function(){
  let bus = document.getElementById("busSelect").value;
  let link = document.getElementById("locationLink").value.trim();

  if(link==""){
    alert("Paste the location first!");
    return;
  }

  set(ref(database,"buses/"+bus), link);
  document.getElementById("status").innerText="Location Updated!";
}

// Logout
window.logout = function(){
  localStorage.removeItem("loggedUser");
  window.location.href = "login.html";
}

</script>

</body>
</html>
