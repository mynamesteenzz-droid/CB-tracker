<!DOCTYPE html>
<html>
<head>
<title>Update Bus Location</title>
</head>
<body>

<h2>Update Bus Live Location</h2>

<select id="busSelect"></select><br><br>
<input type="text" id="link" placeholder="Paste WhatsApp Live Location"><br><br>
<button onclick="updateLocation()">Update</button>
<button onclick="logout()">Logout</button>

<script>

// 🔒 CHECK LOGIN
const user = JSON.parse(localStorage.getItem("loggedUser"));

if (!user) {
  alert("Please login first!");
  window.location.href = "login.html";
}

// create 27 buses
for(let i=1; i<=27; i++){
  const option = document.createElement("option");
  option.value = "bus"+i;
  option.textContent = "Bus "+i;
  document.getElementById("busSelect").appendChild(option);
}

// restrict bus incharge to only their bus
if(user.role === "bus"){
  document.getElementById("busSelect").value = user.bus;
  document.getElementById("busSelect").disabled = true;
}

function updateLocation(){
  const bus = document.getElementById("busSelect").value;
  const link = document.getElementById("link").value;

  if(link === ""){
    alert("Please paste a link first!");
    return;
  }

  localStorage.setItem(bus, link);
  alert("Location Updated Successfully");
}

function logout(){
  localStorage.removeItem("loggedUser");
  window.location.href = "index.html";
}

</script>
</body>
</html>
